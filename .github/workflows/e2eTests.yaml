name: e2e tests for flannel

on: pull_request

permissions:
  contents: read

jobs:
  e2e-test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
    - name: Set up Go 1.x
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 #v6.3.0
      with:
        go-version: ^1.24

    - name: Check out code into the Go module directory
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

    - name: set up modules
      run: sudo modprobe br_netfilter overlay

    - name: Log in to Docker Hub
      if: github.repository_owner == 'flannel-io' && github.event_name != 'pull_request' && success()
      uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 #v4.0.0
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Run tests
      id: testing
      continue-on-error: true
      run: git fetch --unshallow --all --tags && make test 2>&1 > errors.txt

    - name: Show additional logs
      if: steps.testing.outcome != 'success'
      run: |
            cat errors.txt
            exit 1
