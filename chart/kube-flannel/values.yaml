---
global:
  imagePullSecrets:
# - name: "a-secret-name"
  # Labels to be applied to all deployed resources
  commonLabels: {}
  # Annotations to be applied to all deployed resources
  commonAnnotations: {}

# The IPv4 cidr pool to create on startup if none exists. Pod IPs will be
# chosen from this range.
podCidr: "10.244.0.0/16"
podCidrv6: ""

flannel:
  # kube-flannel image
  image:
    repository: ghcr.io/flannel-io/flannel
    tag: v0.28.4
  flannel_cni:
    image:
      repository: ghcr.io/flannel-io/flannel-cni-plugin
      tag: v1.9.1-flannel1
  # cniBinDir is the directory to which the flannel CNI binary is installed.
  cniBinDir: "/opt/cni/bin"
  # cniConfDir is the directory where the CNI configuration is located.
  cniConfDir: "/etc/cni/net.d"
  # skipCNIConfigInstallation skips the installation of the flannel CNI config. This is useful when the CNI config is
  # provided externally.
  skipCNIConfigInstallation: false
  # flannel command arguments
  enableNFTables: false
  args:
  - "--ip-masq"
  - "--kube-subnet-mgr"
  # Backend for kube-flannel. Backend should not be changed
  # at runtime. (vxlan, host-gw, wireguard, udp)
  # Documentation at https://github.com/flannel-io/flannel/blob/master/Documentation/backends.md
  backend: "vxlan"
  # Port used by the backend 0 means default value (VXLAN: 8472, Wireguard: 51821, UDP: 8285)
  #backendPort: 0
  # MTU to use for outgoing packets (VXLAN and WireGuard) if not defined the MTU of the external interface is used.
  # mtu: 1500
  #
  # VXLAN Configs:
  #
  # VXLAN Identifier to be used. On Linux default is 1.
  #vni: 1
  # Enable VXLAN Group Based Policy (Default false)
  # GBP: false
  # Enable direct routes (default is false)
  # directRouting: false
  # MAC prefix to be used on Windows. (Defaults is 0E-2A)
  # macPrefix: "0E-2A"
  #
  # WireGuard Configs:
  #
  # UDP listen port used with IPv6
  # backendPortv6: 51821
  # Pre shared key to use
  # psk: 0
  # IP version to use on WireGuard
  # tunnelMode: "separate"
  # Persistent keep interval to use
  # keepaliveInterval: 0
  #
  cniConf: |
    {
      "name": "cbr0",
      "cniVersion": "0.3.1",
      "plugins": [
        {
          "type": "flannel",
          "delegate": {
            "hairpinMode": true,
            "isDefaultGateway": true
          }
        },
        {
          "type": "portmap",
          "capabilities": {
            "portMappings": true
          }
        }
      ]
    }
  #
  # General daemonset configs
  #
  resources:
    requests:
      cpu: 100m
      memory: 50Mi
  tolerations:
  - effect: NoExecute
    operator: Exists
  - effect: NoSchedule
    operator: Exists
  nodeSelector: {}

  configMap:
    # Additional labels to add to the ConfigMap
    labels: {}
    # Additional annotations to add to the ConfigMap
    annotations: {}

  # Labels to be applied to the deployed pods
  podLabels: {}
  # Annotations to be applied to the deployed pods
  podAnnotations: {}

  daemonSet:
    # Additional labels to add to the DaemonSet
    labels: {}
    # Additional annotations to add to the DaemonSet
    annotations: {}

  serviceAccount:
    # Additional labels to add to the service account
    labels: {}
    # Additional annotations to add to the service account
    annotations: {}

  rbac:
    # Additional labels to add to all RBAC-related resources
    labels: {}
    # Additional annotations to add to all RBAC-related resources
    annotations: {}
    clusterRole:
      # Additional labels to add to the ClusterRole
      labels: {}
      # Additional annotations to add to the ClusterRole
      annotations: {}
    clusterRoleBinding:
      # Additional labels to add to the ClusterRoleBinding
      labels: {}
      # Additional annotations to add to the ClusterRoleBinding
      annotations: {}


netpol:
  enabled: false
  args:
  - "--hostname-override=$(MY_NODE_NAME)"
  - "--v=2"
  image:
    repository: registry.k8s.io/networking/kube-network-policies
    tag: v1.0.0
