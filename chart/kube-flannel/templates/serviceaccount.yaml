apiVersion: v1
kind: ServiceAccount
metadata:
  name: flannel
  namespace: {{ .Release.Namespace }}
  {{- with merge .Values.flannel.serviceAccount.labels .Values.global.commonLabels }}
  labels:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with merge .Values.flannel.serviceAccount.annotations .Values.global.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
